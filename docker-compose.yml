# docker-compose.yml

name: parking-system

services:
  postgres:
    image: postgres:17-alpine
    container_name: parking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT_EXTERNAL}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - parking-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: parking-redis
    restart: unless-stopped
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${REDIS_PORT_EXTERNAL}:6379"
    volumes:
      - redis_data:/data
    networks:
      - parking-network
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: parking-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MINIO_PORT_EXTERNAL}:9000"
      - "${MINIO_CONSOLE_PORT_EXTERNAL}:9001"
    volumes:
      - minio_data:/data
    networks:
      - parking-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: parking-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks:
      - parking-network
    entrypoint: >
      /bin/sh -c " mc alias set parking http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; mc mb --ignore-existing parking/$${MINIO_BUCKET}; mc anonymous set none parking/$${MINIO_BUCKET}; exit 0; "
    restart: "no"

  parking-api:
    build:
      context: ./apps/parking-api
      dockerfile: Dockerfile
    container_name: parking-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_NAME: parking-api
      APP_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    ports:
      - "${API_PORT_EXTERNAL}:${API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - parking-network
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:${API_PORT}/health\", timeout=3)'" ]
      interval: 15s
      timeout: 5s
      retries: 10

  parking-gateway:
    build:
      context: ./apps/parking-gateway
      dockerfile: Dockerfile
    container_name: parking-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_NAME: parking-gateway
      APP_PORT: ${GATEWAY_PORT}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      AGENT_TOKEN_SECRET: ${AGENT_TOKEN_SECRET}
    ports:
      - "${GATEWAY_PORT_EXTERNAL}:${GATEWAY_PORT}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - parking-network
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:${GATEWAY_PORT}/health\", timeout=3)'" ]
      interval: 15s
      timeout: 5s
      retries: 10

  parking-web:
    build:
      context: ./apps/parking-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GATEWAY_WS_URL: ${VITE_GATEWAY_WS_URL}
    container_name: parking-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_GATEWAY_WS_URL: ${VITE_GATEWAY_WS_URL}
    ports:
      - "${WEB_PORT_EXTERNAL}:3000"
    depends_on:
      parking-api:
        condition: service_started
      parking-gateway:
        condition: service_started
    networks:
      - parking-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10

  parking-device-agent:
    build:
      context: ./apps/parking-device-agent
      dockerfile: Dockerfile
    container_name: parking-device-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_NAME: parking-device-agent
      GATEWAY_WS_URL: ${DEVICE_AGENT_GATEWAY_WS_URL}
      AGENT_ID: ${DEVICE_AGENT_ID}
      AGENT_TOKEN: ${DEVICE_AGENT_TOKEN}
      MOCK_RFID: ${MOCK_RFID}
      MOCK_BARRIER: ${MOCK_BARRIER}
    volumes:
      - ./config/device-agent.yaml:/app/config/device-agent.yaml:ro
      - device_agent_data:/app/data
    depends_on:
      parking-gateway:
        condition: service_started
    networks:
      - parking-network

  parking-camera-agent:
    build:
      context: ./apps/parking-camera-agent
      dockerfile: Dockerfile
    container_name: parking-camera-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_NAME: parking-camera-agent
      GATEWAY_WS_URL: ${CAMERA_AGENT_GATEWAY_WS_URL}
      AGENT_ID: ${CAMERA_AGENT_ID}
      AGENT_TOKEN: ${CAMERA_AGENT_TOKEN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MOCK_CAMERA: ${MOCK_CAMERA}
    volumes:
      - ./config/camera-agent.yaml:/app/config/camera-agent.yaml:ro
      - camera_agent_cache:/app/cache
      - camera_agent_data:/app/data
    depends_on:
      parking-gateway:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - parking-network

  worker-ocr:
    build:
      context: ./apps/parking-worker
      dockerfile: Dockerfile
    container_name: parking-worker-ocr
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_NAME: worker-ocr
      WORKER_QUEUE: ocr
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MOCK_OCR: ${MOCK_OCR}
    command: celery -A app.celery_app worker -Q ocr --loglevel=INFO --concurrency=${WORKER_CONCURRENCY}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - parking-network

  worker-alpr:
    build:
      context: ./apps/parking-worker
      dockerfile: Dockerfile
    container_name: parking-worker-alpr
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_NAME: worker-alpr
      WORKER_QUEUE: alpr
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MOCK_ALPR: ${MOCK_ALPR}
      ALPR_DEVICE: ${ALPR_DEVICE}
    command: celery -A app.celery_app worker -Q alpr --loglevel=INFO --concurrency=${WORKER_CONCURRENCY}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - parking-network

  worker-media:
    build:
      context: ./apps/parking-worker
      dockerfile: Dockerfile
    container_name: parking-worker-media
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_NAME: worker-media
      WORKER_QUEUE: media
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    command: celery -A app.celery_app worker -Q media --loglevel=INFO --concurrency=${WORKER_CONCURRENCY}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - parking-network

  worker-cleanup:
    build:
      context: ./apps/parking-worker
      dockerfile: Dockerfile
    container_name: parking-worker-cleanup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_NAME: worker-cleanup
      WORKER_QUEUE: cleanup
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    command: celery -A app.celery_app worker -Q cleanup --loglevel=INFO --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - parking-network

  nginx:
    image: nginx:alpine
    container_name: parking-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT_EXTERNAL}:80"
      - "${NGINX_HTTPS_PORT_EXTERNAL}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      parking-web:
        condition: service_started
      parking-api:
        condition: service_started
      parking-gateway:
        condition: service_started
    networks:
      - parking-network
    profiles:
      - proxy

  # Bật service này khi cần chạy ALPR bằng GPU NVIDIA.
  # Cách chạy:
  # docker compose --profile gpu up -d worker-alpr-gpu
  worker-alpr-gpu:
    build:
      context: ./apps/parking-worker
      dockerfile: Dockerfile.gpu
    container_name: parking-worker-alpr-gpu
    restart: unless-stopped
    profiles:
      - gpu
    env_file:
      - .env
    environment:
      WORKER_NAME: worker-alpr-gpu
      WORKER_QUEUE: alpr
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MOCK_ALPR: "false"
      ALPR_DEVICE: cuda
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
    command: celery -A app.celery_app worker -Q alpr --loglevel=INFO --concurrency=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - parking-network

networks:
  parking-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  device_agent_data:
  camera_agent_cache:
  camera_agent_data:
